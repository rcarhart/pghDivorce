<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Received | Pittsburgh Divorce</title>
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #1c1c1c;
      --gold: #ffb81c;
      --muted: #66727f;
      --light: #f7f7f5;
    }
    body {
      font-family: 'Georgia', serif;
      background: var(--light);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .checkmark {
      width: 64px;
      height: 64px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 28px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .back-link {
      display: inline-block;
      margin-top: 32px;
      color: var(--muted);
      font-size: 0.9rem;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
    }
    .back-link:hover { color: var(--black); }
  </style>
</head>
<body>
  <div class="card">
    <div class="checkmark">✓</div>
    <h1>Request Received</h1>
    <p>Thank you for reaching out. A qualified Pittsburgh divorce attorney will review your information and be in touch within 24 hours.</p>
    <p>Your submission is completely confidential.</p>
    <a href="/" class="back-link">← Back to Pittsburgh Divorce</a>
  </div>
</body>
</html>
